name: Update Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Check for data updates
        id: check
        run: |
          REMOTE_MODIFIED=$(curl -s "https://www.data.gouv.fr/api/1/datasets/61a73dcfe3171089843587bf/" | node -e "
            let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              console.log(JSON.parse(d).last_modified);
            });
          ")
          echo "remote_modified=$REMOTE_MODIFIED" >> $GITHUB_OUTPUT

          if [ -f data/meta.json ]; then
            LOCAL_MODIFIED=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/meta.json','utf-8')).lastModified)")
            echo "local_modified=$LOCAL_MODIFIED" >> $GITHUB_OUTPUT
            if [ "$REMOTE_MODIFIED" = "$LOCAL_MODIFIED" ]; then
              echo "needs_update=false" >> $GITHUB_OUTPUT
              echo "Data is up to date"
            else
              echo "needs_update=true" >> $GITHUB_OUTPUT
              echo "Data needs update: $LOCAL_MODIFIED -> $REMOTE_MODIFIED"
            fi
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "No local data found"
          fi

      - name: Fetch and process data
        if: steps.check.outputs.needs_update == 'true'
        run: npx tsx scripts/fetch-data.ts --force

      - name: Commit updated data
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update data (${{ steps.check.outputs.remote_modified }})" || echo "No changes"
          git push
